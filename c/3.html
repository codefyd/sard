<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>استعلام نتائج الطلاب</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap"/>
  <style>
    :root{
      --primary:#014979;--primary-dk:#013560;--primary-lt:#e8f2fb;
      --gold:#b19738;--gold-lt:#faf3e0;--success:#1a7a4a;
      --danger:#c0392b;--warning:#d97706;--bg:#f4f6f9;
      --card-bg:#ffffff;--text:#1e293b;--text-muted:#64748b;
      --border:rgba(1,73,121,0.10);
      --shadow-sm:0 2px 8px rgba(1,73,121,0.07);
      --shadow-lg:0 12px 40px rgba(1,73,121,0.14);
      --radius:14px;--radius-sm:8px;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

    .navbar-sard{background:var(--primary);padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:1000;box-shadow:0 2px 16px rgba(0,0,0,0.18);}
    .navbar-brand{color:#fff;font-size:1.15rem;font-weight:800;display:flex;align-items:center;gap:8px;}
    .navbar-brand i{color:var(--gold);font-size:1.2rem;}
    .nav-back{padding:6px 14px;border-radius:20px;border:none;background:rgba(255,255,255,0.12);color:rgba(255,255,255,.85);font-family:'Tajawal',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;text-decoration:none;transition:background .2s;}
    .nav-back:hover{background:rgba(255,255,255,0.22);}

    .page-wrap{padding:20px;max-width:820px;margin:auto;padding-bottom:40px;}
    .card-sard{background:var(--card-bg);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow-sm);padding:20px;margin-bottom:16px;}
    .card-title{font-size:1rem;font-weight:700;color:var(--primary);display:flex;align-items:center;gap:8px;margin-bottom:16px;}

    .kpi-card{background:var(--card-bg);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow-sm);padding:16px;position:relative;overflow:hidden;transition:transform .25s,box-shadow .25s;}
    .kpi-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);}
    .kpi-float{position:absolute;left:-8px;bottom:-8px;font-size:4rem;opacity:.07;pointer-events:none;}
    .kpi-label{font-size:.78rem;color:var(--text-muted);font-weight:500;margin-bottom:4px;}
    .kpi-value{font-size:1.7rem;font-weight:800;color:var(--primary);line-height:1.1;}
    .kpi-value.green{color:var(--success);}.kpi-value.red{color:var(--danger);}

    .prog-bar{width:100%;height:6px;background:#e2e8f0;border-radius:99px;overflow:hidden;margin-top:6px;}
    .prog-fill{height:100%;border-radius:99px;transition:width .6s ease;}
    .prog-green{background:linear-gradient(90deg,#10b981,#34d399);}
    .prog-blue{background:linear-gradient(90deg,#3b82f6,#60a5fa);}
    .prog-amber{background:linear-gradient(90deg,#f59e0b,#fbbf24);}
    .prog-red{background:linear-gradient(90deg,#ef4444,#f87171);}

    .badge-sard{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:.78rem;font-weight:600;}
    .badge-pass{background:#d1fae5;color:#065f46;}.badge-fail{background:#fee2e2;color:#991b1b;}
    .badge-prim{background:var(--primary-lt);color:var(--primary);}.badge-gold{background:var(--gold-lt);color:#7c6620;}

    .btn-primary-sard{background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);padding:9px 20px;font-family:'Tajawal',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:background .2s,transform .15s;display:inline-flex;align-items:center;gap:7px;}
    .btn-primary-sard:hover{background:var(--primary-dk);transform:translateY(-1px);}
    .btn-outline-sard{background:transparent;color:var(--primary);border:1.5px solid var(--primary);border-radius:var(--radius-sm);padding:8px 18px;font-family:'Tajawal',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
    .btn-outline-sard:hover{background:var(--primary);color:#fff;}

    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
    .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
    @media(max-width:640px){.grid-4,.grid-3{grid-template-columns:1fr 1fr;}.grid-2{grid-template-columns:1fr;}}

    .spinner-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px;}
    .spinner{width:44px;height:44px;border:4px solid var(--primary-lt);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    .d-flex{display:flex;}.align-center{align-items:center;}.justify-between{justify-content:space-between;}
    .gap-2{gap:8px;}.gap-3{gap:12px;}.flex-wrap{flex-wrap:wrap;}
    .fw-bold{font-weight:700;}.text-muted{color:var(--text-muted);font-size:.85rem;}
    .mt-2{margin-top:8px;}.mt-3{margin-top:12px;}
    .animate-in{animation:fadeUp .35s ease;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}

    /* SEARCH */
    .search-input{width:100%;height:50px;padding:0 16px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'Tajawal',sans-serif;font-size:1rem;background:#fff;outline:none;transition:border-color .2s,box-shadow .2s;}
    .search-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(1,73,121,.10);}
    .tab-btn{padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:.85rem;font-weight:700;color:var(--primary);transition:all .2s;}
    .tab-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}

    /* MINI TABLE */
    .mini-tbl-wrap{overflow-x:auto;border-radius:var(--radius-sm);}
    .mini-table{width:100%;border-collapse:collapse;font-size:.8rem;}
    .mini-table th,.mini-table td{border:1px solid var(--border);padding:6px 9px;text-align:center;vertical-align:middle;white-space:nowrap;}
    .mini-table thead th{background:var(--primary-lt);color:var(--primary);font-weight:700;}
    .mini-table thead th.th-part{background:var(--primary);color:#fff;font-weight:800;}
    .mini-table td.td-label{background:var(--primary-lt);color:var(--primary);font-weight:700;text-align:right;min-width:70px;}
    .mini-table td.td-part{background:#f8fafc;font-weight:800;color:var(--primary-dk);text-align:center;}
    .mini-table tbody tr:hover td{background:rgba(1,73,121,0.04);}
    .mini-table tbody tr:hover td.td-label{background:var(--primary-lt);}
    .cell-pass{color:var(--success);font-weight:800;}
    .cell-fail{color:var(--danger);font-weight:800;}
    .cell-empty{color:#d1d5db;}

    /* =====================================================
       CERTIFICATE — تصميم شهادة فاخرة للطباعة
    ===================================================== */
    #certOverlay{
      display:none;
      position:fixed;inset:0;
      background:rgba(0,0,0,0.72);
      z-index:9999;
      align-items:center;
      justify-content:center;
      padding:20px;
      overflow-y:auto;
    }
    #certOverlay.show{display:flex;}

    .cert-actions{
      position:fixed;
      top:16px;left:50%;
      transform:translateX(-50%);
      display:flex;gap:10px;
      z-index:10000;
    }
    .cert-btn{
      padding:9px 20px;
      border-radius:var(--radius-sm);
      border:none;
      font-family:'Tajawal',sans-serif;
      font-size:.9rem;
      font-weight:700;
      cursor:pointer;
      display:inline-flex;align-items:center;gap:6px;
      transition:all .2s;
    }
    .cert-btn-print{background:#fff;color:var(--primary);}
    .cert-btn-print:hover{background:#f0f4f8;}
    .cert-btn-close{background:rgba(255,255,255,0.15);color:#fff;border:1.5px solid rgba(255,255,255,.3);}
    .cert-btn-close:hover{background:rgba(255,255,255,0.25);}

    /* ورقة الشهادة */
    .cert-paper{
      background:#fff;
      width:100%;
      max-width:800px;
      min-height:560px;
      position:relative;
      border-radius:4px;
      overflow:hidden;
      box-shadow:0 24px 80px rgba(0,0,0,0.5);
      direction:rtl;
      margin-top:56px;
    }

    /* الإطار الخارجي الذهبي */
    .cert-outer-border{
      position:absolute;
      inset:10px;
      border:2.5px solid var(--gold);
      border-radius:2px;
      pointer-events:none;
      z-index:2;
    }
    .cert-inner-border{
      position:absolute;
      inset:16px;
      border:1px solid rgba(177,151,56,0.4);
      border-radius:1px;
      pointer-events:none;
      z-index:2;
    }

    /* زوايا زخرفية */
    .cert-corner{
      position:absolute;
      width:40px;height:40px;
      z-index:3;
    }
    .cert-corner svg{width:100%;height:100%;}
    .cert-corner.tl{top:6px;right:6px;}
    .cert-corner.tr{top:6px;left:6px;transform:scaleX(-1);}
    .cert-corner.bl{bottom:6px;right:6px;transform:scaleY(-1);}
    .cert-corner.br{bottom:6px;left:6px;transform:scale(-1,-1);}

    /* خلفية الشهادة */
    .cert-bg{
      position:absolute;
      inset:0;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(177,151,56,0.07) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 100%, rgba(1,73,121,0.05) 0%, transparent 60%);
      z-index:0;
    }

    /* نقش المائية */
    .cert-watermark{
      position:absolute;
      top:50%;left:50%;
      transform:translate(-50%,-50%);
      font-size:10rem;
      color:rgba(1,73,121,0.04);
      z-index:0;
      pointer-events:none;
      line-height:1;
    }

    /* محتوى الشهادة */
    .cert-content{
      position:relative;
      z-index:1;
      padding:36px 56px 32px;
      text-align:center;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:0;
    }

    /* رأس الشهادة */
    .cert-header-line{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:6px;
      width:100%;
      justify-content:center;
    }
    .cert-header-divider{
      flex:1;
      height:1px;
      background:linear-gradient(90deg,transparent,var(--gold),transparent);
      max-width:120px;
    }
    .cert-logo-text{
      font-size:1.05rem;
      font-weight:800;
      color:var(--primary);
      letter-spacing:0.02em;
    }
    .cert-complex{
      font-size:.82rem;
      color:var(--text-muted);
      margin-bottom:10px;
    }

    /* عنوان الشهادة */
    .cert-title-ar{
      font-size:1.9rem;
      font-weight:900;
      color:var(--primary);
      line-height:1.2;
      margin-bottom:2px;
      letter-spacing:0.01em;
    }
    .cert-subtitle{
      font-size:.88rem;
      color:var(--gold);
      font-weight:700;
      letter-spacing:0.08em;
      margin-bottom:16px;
    }

    /* الزخرفة الوسطى */
    .cert-ornament{
      color:var(--gold);
      font-size:1.3rem;
      margin-bottom:14px;
      letter-spacing:8px;
      opacity:.8;
    }

    /* جسم الشهادة */
    .cert-body-text{
      font-size:.92rem;
      color:#374151;
      line-height:2.1;
      margin-bottom:10px;
      max-width:600px;
    }

    .cert-name-box{
      display:inline-block;
      border-bottom:2px solid var(--gold);
      padding:0 24px 2px;
      margin:0 6px;
    }
    .cert-student-name{
      font-size:1.55rem;
      font-weight:900;
      color:var(--primary);
      display:inline;
    }

    /* بطاقات الإحصاء */
    .cert-stats{
      display:flex;
      gap:0;
      width:100%;
      margin:16px 0;
      border:1.5px solid rgba(177,151,56,0.35);
      border-radius:6px;
      overflow:hidden;
    }
    .cert-stat-cell{
      flex:1;
      padding:12px 8px;
      text-align:center;
      border-left:1px solid rgba(177,151,56,0.25);
    }
    .cert-stat-cell:last-child{border-left:none;}
    .cert-stat-num{
      font-size:1.6rem;
      font-weight:900;
      line-height:1;
      margin-bottom:4px;
    }
    .cert-stat-label{
      font-size:.72rem;
      color:var(--text-muted);
      font-weight:600;
    }
    .cert-stat-num.blue{color:var(--primary);}
    .cert-stat-num.green{color:var(--success);}
    .cert-stat-num.red{color:var(--danger);}
    .cert-stat-num.gold{color:var(--gold);}

    /* توقيعات */
    .cert-sigs{
      display:flex;
      width:100%;
      gap:24px;
      margin-top:16px;
    }
    .cert-sig{
      flex:1;
      text-align:center;
      border-top:1.5px solid var(--gold);
      padding-top:8px;
    }
    .cert-sig-title{
      font-size:.75rem;
      color:var(--text-muted);
      font-weight:700;
      margin-bottom:4px;
    }
    .cert-sig-name{
      font-size:.9rem;
      font-weight:800;
      color:var(--primary);
    }

    /* التاريخ وختم */
    .cert-footer{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-top:14px;
      font-size:.75rem;
      color:var(--text-muted);
    }
    .cert-stamp{
      width:60px;height:60px;
      border-radius:50%;
      border:2px solid var(--gold);
      display:flex;align-items:center;justify-content:center;
      color:var(--gold);
      font-size:1.4rem;
      opacity:.55;
    }

    /* طباعة */
    @media print{
      body *{visibility:hidden;}
      #certOverlay,#certOverlay *{visibility:visible;}
      #certOverlay{position:static;background:none;padding:0;display:block!important;}
      .cert-actions{display:none!important;}
      .cert-paper{margin:0;box-shadow:none;max-width:100%;}
    }
  </style>
</head>
<body>

<nav class="navbar-sard">
  <div class="navbar-brand">
    <i class="fas fa-quran"></i>
    <span>استعلام نتائج الطلاب</span>
  </div>
  <a href="../برنامج_السرد.html" class="nav-back"><i class="fas fa-arrow-right"></i> العودة</a>
</nav>

<div class="page-wrap">
  <div class="card-sard animate-in">
    <div class="card-title"><i class="fas fa-magnifying-glass" style="color:var(--gold);"></i> الاستعلام عن نتيجة الطالب</div>
    <p class="text-muted" style="margin-bottom:14px;">البحث عبر: <b>جوال ولي الأمر</b> أو <b>ID الهوية</b></p>
    <div class="d-flex gap-2">
      <input id="q" type="text" class="search-input" placeholder="أدخل جوال ولي الأمر أو ID الهوية" autocomplete="off"/>
      <button id="btn" class="btn-primary-sard" onclick="run()" style="white-space:nowrap;height:50px;">
        <i class="fas fa-search" id="ico"></i> بحث
      </button>
    </div>
  </div>
  <div id="tabs" class="d-flex gap-2 flex-wrap" style="margin-bottom:12px;display:none!important;"></div>
  <div id="out"></div>
</div>

<!-- شهادة -->
<div id="certOverlay" onclick="closeCertIfBg(event)">
  <div class="cert-actions">
    <button class="cert-btn cert-btn-print" onclick="window.print()"><i class="fas fa-print"></i> طباعة</button>
    <button class="cert-btn cert-btn-close" onclick="closeCert()"><i class="fas fa-times"></i> إغلاق</button>
  </div>
  <div class="cert-paper" id="certPaper">
    <!-- يُملأ بجافاسكريبت -->
  </div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbxfvdCcCCZ2eh8LSMKqlllcCKcn0e6HunPkfc3Ue_IXP6rWdeHxrEaYafN60-sVVpcT/exec";

function jsonp(action,params){
  return new Promise(function(resolve,reject){
    var cb='jcb_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    var url=new URL(API);
    url.searchParams.set('action',action);
    if(params)Object.keys(params).forEach(function(k){url.searchParams.set(k,String(params[k]));});
    url.searchParams.set('prefix',cb);
    var done=false;
    var cleanup=function(){try{delete window[cb];}catch(e){}var s=document.getElementById(cb);if(s)s.remove();};
    window[cb]=function(d){if(done)return;done=true;cleanup();if(d&&d.error)reject(new Error(d.error));else resolve(d);};
    var s=document.createElement('script');s.id=cb;
    s.onerror=function(){if(done)return;done=true;cleanup();reject(new Error('فشل الاتصال'));};
    s.src=url.toString();document.body.appendChild(s);
  });
}

function fN(v){return Number(v||0).toLocaleString('en-US');}
function fP(v){return Number(v||0).toLocaleString('en-US',{maximumFractionDigits:1});}
function escH(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]);});}
function pgCls(p){return p>=80?'prog-green':p>=60?'prog-blue':p>=40?'prog-amber':'prog-red';}

function kpiCard(label,value,icon,colorCls){
  return '<div class="kpi-card">'
    +'<div class="kpi-label">'+escH(label)+'</div>'
    +'<div class="kpi-value '+(colorCls||'')+'">'+escH(String(value))+'</div>'
    +'<i class="fas '+escH(icon)+' kpi-float"></i></div>';
}

/* ===============================================================
   buildMiniTable — يدعم div=1 و div=2 و div=4
=============================================================== */
function buildMiniTable(sections,partsDivisions){
  if(!sections||!sections.length)return '<p class="text-muted" style="padding:16px;text-align:center;">لا توجد مقاطع مسجَّلة</p>';
  var div=Number(partsDivisions)||2;
  var label=div===4?'الربع':div===1?'الجزء كامل':'الحزب';
  var map={};
  sections.forEach(function(s){
    if(!s||!s.partNumber)return;
    var pn=Number(s.partNumber);if(!pn||pn<1||pn>30)return;
    var hz=div===1?1:Number(s.hizb||1);if(hz<1||hz>div)return;
    if(!map[pn]){map[pn]={};for(var i=1;i<=div;i++)map[pn][i]=null;}
    map[pn][hz]=s;
  });
  var parts=Object.keys(map).sort(function(a,b){return Number(a)-Number(b);});
  if(!parts.length)return '<p class="text-muted" style="padding:16px;text-align:center;">لا توجد مقاطع مسجَّلة</p>';

  var thead='<thead>';
  if(div===1){
    thead+='<tr>'
      +'<th class="td-label">المسمّع</th>'
      +'<th>الجزء</th>'
      +'<th class="th-part">الأخطاء</th>'
      +'<th class="th-part">التنبيهات</th>'
      +'<th class="th-part">الدرجة</th>'
      +'<th class="th-part">وجه الرسوب</th>'
      +'</tr>';
  } else {
    thead+='<tr><th class="td-label" rowspan="2">المسمّع</th><th rowspan="2">الجزء</th>';
    for(var i=1;i<=div;i++) thead+='<th colspan="4" class="th-part">'+escH(label)+' '+i+'</th>';
    thead+='</tr><tr>';
    for(var i=1;i<=div;i++) thead+='<th>خطأ</th><th>تنبيه</th><th>الدرجة</th><th>وجه</th>';
    thead+='</tr>';
  }
  thead+='</thead>';

  var tbody=parts.map(function(pn){
    var hizbArr=[];for(var i=1;i<=div;i++)hizbArr.push(map[pn][i]);
    var teachers=[];
    hizbArr.forEach(function(h){if(h&&h.teacherName&&h.teacherName.trim())teachers.push(h.teacherName.trim());});
    teachers=teachers.filter(function(v,i,a){return a.indexOf(v)===i;});
    var tD=teachers.length?teachers.join(' / '):'—';

    if(div===1){
      var h=hizbArr[0];
      if(!h)return '<tr><td class="td-label">'+escH(tD)+'</td><td class="td-part">'+pn+'</td><td class="cell-empty">—</td><td class="cell-empty">—</td><td class="cell-empty">—</td><td class="cell-empty">—</td></tr>';
      var sc=Number(h.score);var scStr=isFinite(sc)?(Math.abs(sc-Math.round(sc))<1e-9?String(Math.round(sc)):String(Math.round(sc*10)/10)):'—';
      return '<tr><td class="td-label">'+escH(tD)+'</td><td class="td-part">'+pn+'</td>'
        +'<td>'+escH(String(h.mistakes||0))+'</td>'
        +'<td>'+escH(String(h.warnings||0))+'</td>'
        +'<td class="'+(h.isPassed?'cell-pass':'cell-fail')+'">'+scStr+'</td>'
        +'<td style="font-size:.7rem;">'+((!h.isPassed)?escH(String(h.failFace||'')):'')+'</td></tr>';
    }

    var cells=hizbArr.map(function(h){
      if(!h)return'<td class="cell-empty">—</td><td class="cell-empty">—</td><td class="cell-empty">—</td><td class="cell-empty">—</td>';
      var sc=Number(h.score);var scStr=isFinite(sc)?(Math.abs(sc-Math.round(sc))<1e-9?String(Math.round(sc)):String(Math.round(sc*10)/10)):'—';
      return '<td>'+escH(String(h.mistakes||0))+'</td>'
        +'<td>'+escH(String(h.warnings||0))+'</td>'
        +'<td class="'+(h.isPassed?'cell-pass':'cell-fail')+'">'+scStr+'</td>'
        +'<td style="font-size:.7rem;">'+((!h.isPassed)?escH(String(h.failFace||'')):'')+'</td>';
    }).join('');
    return '<tr><td class="td-label">'+escH(tD)+'</td><td class="td-part">'+pn+'</td>'+cells+'</tr>';
  }).join('');

  return '<div class="mini-tbl-wrap"><table class="mini-table">'+thead+'<tbody>'+tbody+'</tbody></table></div>';
}

function detDiv(sections){
  if(!sections||!sections.length)return 2;
  var mx=0;sections.forEach(function(s){var h=Number(s.hizb||1);if(h>mx)mx=h;});
  return mx>=4?4:mx>=2?2:1;
}

function renderCard(r,idx){
  var stu=r.student||{};var sum=r.summary||{};var sections=Array.isArray(r.sections)?r.sections:[];
  var total=Number(sum.totalSections||sections.length||0);
  var passed=Number(sum.passedSections||0);var failed=Number(sum.failedSections||0);
  var totalScore=Number(sum.totalScore||0);
  var div=detDiv(sections);
  var passRate=total>0?Math.round(passed/total*100):0;

  document.getElementById('out').innerHTML=
    '<div class="card-sard animate-in">'
    +'<div class="d-flex justify-between align-center flex-wrap gap-2" style="margin-bottom:16px;">'
    +'<div>'
    +(stu.halaqa?'<div class="text-muted" style="font-size:.78rem;margin-bottom:2px;"><i class="fas fa-mosque" style="color:var(--gold);margin-left:4px;"></i>'+escH(stu.halaqa)+'</div>':'')
    +'<div style="font-size:1.4rem;font-weight:900;color:var(--primary);">'+escH(stu.name||'طالب')+'</div>'
    +'<div class="d-flex gap-2 flex-wrap mt-2">'
    +(stu.track?'<span class="badge-sard badge-gold"><i class="fas fa-route"></i>'+escH(stu.track)+'</span>':'')
    +(stu.partsCount!=null?'<span class="badge-sard badge-prim"><i class="fas fa-layer-group"></i>محفوظة: '+escH(String(stu.partsCount))+'</span>':'')
    +(stu.id?'<span class="badge-sard" style="background:#f1f5f9;color:#475569;"><i class="fas fa-id-card"></i>'+escH(stu.id)+'</span>':'')
    +'</div></div>'
    +'<div class="d-flex gap-2 flex-wrap">'
    +(stu.guardianPhone?'<button class="btn-outline-sard" onclick="doWA('+idx+')"><i class="fab fa-whatsapp" style="color:#25d366;"></i>واتساب</button>':'')
    +'<button class="btn-primary-sard" onclick="doCert('+idx+')"><i class="fas fa-award"></i>شهادة</button>'
    +'</div></div>'
    +'<div class="grid-4" style="margin-bottom:14px;">'
    +kpiCard('عدد المقاطع',total,'fa-list-ol')
    +kpiCard('المجتاز',passed,'fa-check-circle','green')
    +kpiCard('الرسوب',failed,'fa-times-circle','red')
    +kpiCard('مجموع الدرجات',fP(totalScore),'fa-star')
    +'</div>'
    +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">'
    +'<span style="font-size:.78rem;color:var(--text-muted);">نسبة الاجتياز</span>'
    +'<div style="flex:1;height:8px;background:#e2e8f0;border-radius:99px;overflow:hidden;">'
    +'<div style="height:100%;width:'+passRate+'%;border-radius:99px;background:'+(passRate>=80?'var(--success)':passRate>=60?'#3b82f6':passRate>=40?'#f59e0b':'var(--danger)')+';transition:width .6s;"></div></div>'
    +'<span style="font-size:.85rem;font-weight:800;color:'+(passRate>=80?'var(--success)':passRate>=60?'#3b82f6':'var(--danger)')+';">'+passRate+'%</span>'
    +'</div>'
    +buildMiniTable(sections,div)
    +'</div>';
}

function normalizePhone(p){if(!p)return'';var d=String(p).replace(/\D/g,'');if(d.startsWith('00'))d=d.slice(2);if(d.startsWith('966'))return d;if(d.startsWith('0'))return'966'+d.slice(1);return d;}

function doWA(idx){
  var r=(window.__res||[])[idx];if(!r)return;
  var stu=r.student||{};var sum=r.summary||{};
  var phone=normalizePhone(stu.guardianPhone);if(!phone){alert('لا يوجد رقم ولي أمر');return;}
  var msg='السلام عليكم ورحمة الله وبركاته\n\nولي أمر الطالب: '+(stu.name||'')
    +'\n\nنتيجة عرض السرد:\nعدد المقاطع: '+(sum.totalSections||0)
    +'\nالمجتاز: '+(sum.passedSections||0)
    +'\nالرسوب: '+(sum.failedSections||0)
    +'\nمجموع الدرجات: '+fP(sum.totalScore||0)
    +'\n\nبارك الله في الجهود.';
  window.open('https://wa.me/'+phone+'?text='+encodeURIComponent(msg),'_blank');
}

/* =====================================================
   دالة بناء الشهادة الفاخرة
===================================================== */
function exportCert(p){
  var pct=p.totalSections>0?Math.round(p.passed/p.totalSections*100):0;
  var pctColor=pct>=80?'#1a7a4a':pct>=60?'#014979':pct>=40?'#d97706':'#c0392b';

  // SVG زخرفة الركن
  var cornerSVG='<svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">'
    +'<path d="M2 2 L2 18 L5 18 L5 5 L18 5 L18 2 Z" fill="#b19738" opacity=".9"/>'
    +'<path d="M2 2 L12 2 L2 12 Z" fill="#b19738" opacity=".5"/>'
    +'<circle cx="20" cy="20" r="2" fill="#b19738" opacity=".4"/>'
    +'</svg>';

  var html=
    '<div class="cert-bg"></div>'
    +'<div class="cert-watermark"><i class="fas fa-quran"></i></div>'
    +'<div class="cert-outer-border"></div>'
    +'<div class="cert-inner-border"></div>'
    +'<div class="cert-corner tl">'+cornerSVG+'</div>'
    +'<div class="cert-corner tr">'+cornerSVG+'</div>'
    +'<div class="cert-corner bl">'+cornerSVG+'</div>'
    +'<div class="cert-corner br">'+cornerSVG+'</div>'

    +'<div class="cert-content">'

    // الرأس
    +'<div class="cert-header-line">'
    +'<div class="cert-header-divider"></div>'
    +'<span class="cert-logo-text"><i class="fas fa-quran" style="color:var(--gold);margin-left:6px;"></i>برنامج السرد</span>'
    +'<div class="cert-header-divider"></div>'
    +'</div>'
    +(p.complexName?'<div class="cert-complex">'+escH(p.complexName)+'</div>':'')

    // عنوان الشهادة
    +'<div class="cert-title-ar">شهادة إتمام السرد</div>'
    +'<div class="cert-subtitle">CERTIFICATE OF RECITATION</div>'

    // زخرفة
    +'<div class="cert-ornament">❧ ✦ ❧</div>'

    // نص الشهادة
    +'<div class="cert-body-text">'
    +'يُشهد بأن الطالب الكريم'
    +'</div>'

    +'<div style="margin-bottom:12px;">'
    +'<div class="cert-name-box"><span class="cert-student-name">'+escH(p.studentName)+'</span></div>'
    +'</div>'

    +'<div class="cert-body-text">'
    +(p.halaqaName?'من حلقة <b>'+escH(p.halaqaName)+'</b> — ':'')
    +(p.track?'مسار <b>'+escH(p.track)+'</b> — ':'')
    +'قد أتمّ عرض سرد <b>'+p.partsSaved+'</b> جزءاً من القرآن الكريم'
    +'</div>'

    // بطاقات الإحصاء
    +'<div class="cert-stats">'
    +'<div class="cert-stat-cell"><div class="cert-stat-num blue">'+p.partsSaved+'</div><div class="cert-stat-label">أجزاء محفوظة</div></div>'
    +'<div class="cert-stat-cell"><div class="cert-stat-num blue">'+p.totalSections+'</div><div class="cert-stat-label">مقاطع معروضة</div></div>'
    +'<div class="cert-stat-cell"><div class="cert-stat-num green">'+p.passed+'</div><div class="cert-stat-label">مجتاز</div></div>'
    +'<div class="cert-stat-cell"><div class="cert-stat-num red">'+p.failed+'</div><div class="cert-stat-label">راسب</div></div>'
    +'<div class="cert-stat-cell" style="background:linear-gradient(135deg,rgba(177,151,56,0.06),rgba(177,151,56,0.12));">'
    +'<div class="cert-stat-num" style="color:'+pctColor+';">'+pct+'%</div>'
    +'<div class="cert-stat-label">نسبة الاجتياز</div>'
    +'</div>'
    +'</div>'

    // خط النتيجة
    +'<div style="width:100%;height:4px;background:linear-gradient(90deg,transparent,'+pctColor+',transparent);border-radius:99px;margin-bottom:16px;opacity:.5;"></div>'

    // التوقيعات
    +'<div class="cert-sigs">'
    +(p.managerName
      ?'<div class="cert-sig"><div class="cert-sig-title">مدير المجمع</div><div class="cert-sig-name">'+escH(p.managerName)+'</div></div>'
      :'<div class="cert-sig"><div class="cert-sig-title">مدير المجمع</div><div class="cert-sig-name" style="color:var(--text-muted);font-weight:400;">.............................</div></div>')
    +'<div class="cert-sig"><div class="cert-sig-title">تاريخ الإصدار</div><div class="cert-sig-name">'+escH(p.issueDate)+'</div></div>'
    +'</div>'

    // ختم وتذييل
    +'<div class="cert-footer">'
    +'<div style="font-size:.72rem;color:var(--text-muted);">وُلِّد بواسطة برنامج السرد الإلكتروني</div>'
    +'<div class="cert-stamp"><i class="fas fa-seal"></i></div>'
    +'<div style="font-size:.72rem;color:var(--text-muted);">'+escH(p.issueDate)+'</div>'
    +'</div>'

    +'</div>'; // cert-content

  document.getElementById('certPaper').innerHTML=html;
  document.getElementById('certOverlay').classList.add('show');
  document.body.style.overflow='hidden';
}

function closeCert(){
  document.getElementById('certOverlay').classList.remove('show');
  document.body.style.overflow='';
}
function closeCertIfBg(e){if(e.target===document.getElementById('certOverlay'))closeCert();}

function doCert(idx){
  var r=(window.__res||[])[idx];if(!r)return;
  var stu=r.student||{};var sum=r.summary||{};
  var payload={complexName:'',managerName:'',studentName:stu.name||'',halaqaName:stu.halaqa||'',
    track:stu.track||'',partsSaved:Number(stu.partsCount||0),totalSections:Number(sum.totalSections||0),
    passed:Number(sum.passedSections||0),failed:Number(sum.failedSections||0),totalScore:Number(sum.totalScore||0),
    issueDate:new Date().toLocaleDateString('ar-SA')};
  jsonp('getData').then(function(d){
    if(d&&d.complex&&d.complex.complexName)payload.complexName=d.complex.complexName;
    if(d&&d.complex&&d.complex.managerName)payload.managerName=d.complex.managerName;
    exportCert(payload);
  }).catch(function(){exportCert(payload);});
}

document.getElementById('q').addEventListener('keydown',function(e){if(e.key==='Enter')run();});
function setLoading(on){document.getElementById('ico').className=on?'fas fa-spinner fa-spin':'fas fa-search';document.getElementById('btn').disabled=on;}

function run(){
  var raw=(document.getElementById('q').value||'').trim();
  if(!raw){showEmpty('أدخل جوال ولي الأمر أو ID الهوية');return;}
  document.getElementById('tabs').style.display='none';
  document.getElementById('out').innerHTML='';
  setLoading(true);
  jsonp('lookupStudent',{query:raw})
    .then(function(r){setLoading(false);handleResp(r);})
    .catch(function(e){setLoading(false);showError('خطأ: '+escH(e.message||String(e)));});
}

function handleResp(resp){
  if(!resp||!resp.ok||!Array.isArray(resp.results)||!resp.results.length){showEmpty('لم يُعثَر على نتيجة. تحقق من الرقم أو الـ ID.');return;}
  window.__res=resp.results;
  if(resp.results.length>1){
    var t=document.getElementById('tabs');t.style.display='flex';
    t.innerHTML=resp.results.map(function(r,i){
      return '<button class="tab-btn'+(i===0?' active':'')+'" onclick="setTab('+i+')">'
        +escH(r.student&&r.student.name?r.student.name:('طالب '+(i+1)))
        +(r.student&&r.student.halaqa?' — '+escH(r.student.halaqa):'')+'</button>';
    }).join('');
  }
  renderCard(resp.results[0],0);
}
function setTab(i){
  document.querySelectorAll('.tab-btn').forEach(function(b,j){b.classList.toggle('active',i===j);});
  renderCard(window.__res[i],i);
}
function showEmpty(m){document.getElementById('out').innerHTML='<div class="card-sard" style="text-align:center;padding:32px;color:var(--text-muted);"><i class="fas fa-search" style="font-size:2rem;margin-bottom:8px;display:block;opacity:.3;"></i>'+escH(m)+'</div>';}
function showError(m){document.getElementById('out').innerHTML='<div class="card-sard" style="text-align:center;padding:32px;color:var(--danger);">'+escH(m)+'</div>';}
</script>
</body>
</html>
