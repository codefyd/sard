<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تقرير المجمع والحلق</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap"/>
  <style>
    :root{--primary:#014979;--primary-dk:#013560;--primary-lt:#e8f2fb;--gold:#b19738;--gold-lt:#faf3e0;--success:#1a7a4a;--danger:#c0392b;--warning:#d97706;--bg:#f4f6f9;--card-bg:#ffffff;--text:#1e293b;--text-muted:#64748b;--border:rgba(1,73,121,0.10);--shadow-sm:0 2px 8px rgba(1,73,121,0.07);--shadow-md:0 6px 24px rgba(1,73,121,0.10);--shadow-lg:0 12px 40px rgba(1,73,121,0.14);--radius:14px;--radius-sm:8px;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    .navbar-sard{background:var(--primary);padding:0 16px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:1000;box-shadow:0 2px 12px rgba(0,0,0,0.18);}
    .navbar-brand{color:#fff;font-size:1.2rem;font-weight:800;display:flex;align-items:center;gap:8px;}
    .navbar-brand i{color:var(--gold);font-size:1.3rem;}
    .nav-back{padding:6px 14px;border-radius:20px;border:none;background:rgba(255,255,255,0.12);color:rgba(255,255,255,.85);font-family:'Tajawal',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;text-decoration:none;transition:background .2s;}
    .nav-back:hover{background:rgba(255,255,255,0.22);}
    .page-wrap{padding:20px;max-width:1100px;margin:auto;padding-bottom:40px;}
    .card-sard{background:var(--card-bg);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow-sm);padding:20px;margin-bottom:16px;}
    .card-title{font-size:1rem;font-weight:700;color:var(--primary);display:flex;align-items:center;gap:8px;margin-bottom:16px;}
    .kpi-card{background:var(--card-bg);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow-sm);padding:20px;position:relative;overflow:hidden;transition:transform .25s,box-shadow .25s;}
    .kpi-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);}
    .kpi-card .bg-icon{position:absolute;left:-10px;bottom:-10px;font-size:5rem;opacity:.07;pointer-events:none;}
    .kpi-label{font-size:.8rem;color:var(--text-muted);font-weight:500;margin-bottom:4px;}
    .kpi-value{font-size:2rem;font-weight:800;color:var(--primary);line-height:1;}
    .kpi-value.green{color:var(--success);}.kpi-value.red{color:var(--danger);}.kpi-value.gold{color:var(--gold);}
    .badge-sard{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:.78rem;font-weight:600;}
    .badge-pass{background:#d1fae5;color:#065f46;}.badge-fail{background:#fee2e2;color:#991b1b;}
    .badge-prim{background:var(--primary-lt);color:var(--primary);}.badge-gold{background:var(--gold-lt);color:#7c6620;}
    .badge-warn{background:#fef3c7;color:#92400e;}.badge-info{background:#dbeafe;color:#1e40af;}
    .rank-badge{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;font-weight:800;font-size:.8rem;}
    .rank-1{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#fff;box-shadow:0 3px 8px rgba(245,158,11,.4);}
    .rank-2{background:linear-gradient(135deg,#94a3b8,#64748b);color:#fff;}
    .rank-3{background:linear-gradient(135deg,#d97706,#b45309);color:#fff;}
    .rank-n{background:#e2e8f0;color:#475569;}
    .prog-bar{width:100%;height:6px;background:#e2e8f0;border-radius:99px;overflow:hidden;margin-top:6px;}
    .prog-fill{height:100%;border-radius:99px;transition:width .5s;}
    .prog-green{background:linear-gradient(90deg,#10b981,#34d399);}
    .prog-blue{background:linear-gradient(90deg,#3b82f6,#60a5fa);}
    .prog-amber{background:linear-gradient(90deg,#f59e0b,#fbbf24);}
    .prog-red{background:linear-gradient(90deg,#ef4444,#f87171);}
    .tbl-wrap{overflow-x:auto;border-radius:var(--radius);box-shadow:var(--shadow-sm);}
    .sard-table{width:100%;border-collapse:collapse;font-size:.82rem;}
    .sard-table thead th{background:var(--primary-lt);color:var(--primary);font-weight:700;padding:10px 12px;text-align:right;border-bottom:2px solid var(--primary);white-space:nowrap;}
    .sard-table tbody tr{background:#fff;transition:background .15s;}
    .sard-table tbody tr:nth-child(even){background:#fafbfd;}
    .sard-table tbody tr:hover{background:var(--primary-lt);}
    .sard-table tbody tr.row-sel{background:var(--primary-lt);outline:2px solid var(--primary);}
    .sard-table tbody td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
    .sard-select{appearance:none;background:#fff;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 32px 8px 12px;font-size:.9rem;font-weight:500;color:var(--primary);cursor:pointer;font-family:'Tajawal',sans-serif;background-image:url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23014979' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");background-position:left 8px center;background-repeat:no-repeat;background-size:1.2em;}
    .sard-select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(1,73,121,.10);}
    .btn-primary-sard{background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);padding:9px 20px;font-family:'Tajawal',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:background .2s,transform .15s;display:inline-flex;align-items:center;gap:7px;}
    .btn-primary-sard:hover{background:var(--primary-dk);transform:translateY(-1px);}
    .btn-outline-sard{background:transparent;color:var(--primary);border:1.5px solid var(--primary);border-radius:var(--radius-sm);padding:8px 18px;font-family:'Tajawal',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
    .btn-outline-sard:hover{background:var(--primary);color:#fff;}
    .sel-chip{padding:8px 16px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:#fff;cursor:pointer;transition:all .2s;font-family:'Tajawal',sans-serif;font-size:.88rem;}
    .sel-chip:hover{border-color:var(--primary);background:var(--primary-lt);}
    .sel-chip.active{background:var(--primary);color:#fff;border-color:var(--primary);}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
    .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
    .grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
    @media(max-width:900px){.grid-5{grid-template-columns:repeat(3,1fr);}.grid-4{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:640px){.grid-3,.grid-4,.grid-5{grid-template-columns:1fr 1fr;}.grid-2{grid-template-columns:1fr;}}
    .spinner-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px;}
    .spinner{width:44px;height:44px;border:4px solid var(--primary-lt);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .d-flex{display:flex;}.align-center{align-items:center;}.justify-between{justify-content:space-between;}
    .gap-2{gap:8px;}.gap-3{gap:12px;}.fw-bold{font-weight:700;}.mt-3{margin-top:12px;}.flex-wrap{flex-wrap:wrap;}
    .text-muted{color:var(--text-muted);font-size:.85rem;}
    .animate-in{animation:fadeUp .35s ease;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
    /* sard-mini-table - dynamic cols */
    .sard-mini-table{width:100%;border-collapse:collapse;}
    .sard-mini-table th,.sard-mini-table td{border:1px solid var(--border);padding:5px 8px;font-size:.78rem;text-align:center;vertical-align:middle;white-space:nowrap;}
    .sard-mini-table th{background:var(--primary-lt);color:var(--primary);font-weight:700;}
    .sard-mini-table th.th-part{background:var(--primary);color:#fff;}
    .sard-mini-table td.td-label{background:var(--primary-lt);color:var(--primary);font-weight:700;text-align:right;min-width:80px;}
    .sard-mini-table tbody tr:nth-child(even) td:not(.td-label){background:#fafbfd;}
    .mc-pass{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:5px;background:#d1fae5;color:#065f46;font-weight:800;font-size:.78rem;}
    .mc-fail{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:5px;background:#fee2e2;color:#991b1b;font-weight:800;font-size:.78rem;}
    .mc-score{font-size:.62rem;color:var(--primary-dk);font-weight:700;margin-top:1px;}
    .mc-empty{color:#d1d5db;font-size:.85rem;}
</style>
</head>
<body>
<nav class="navbar-sard">
  <div class="navbar-brand"><i class="fas fa-quran"></i><span>تقرير المجمع والحلق</span></div>
  <div class="d-flex align-center gap-2">
    <button onclick="loadData()" class="btn-primary-sard" style="padding:7px 16px;font-size:.85rem;"><i class="fas fa-rotate"></i> تحديث</button>
    <a href="../برنامج_السرد.html" class="nav-back"><i class="fas fa-arrow-right"></i> العودة</a>
  </div>
</nav>
<div class="page-wrap" id="app">
  <div class="spinner-wrap animate-in"><div class="spinner"></div><span class="text-muted">جاري تحميل التقرير...</span></div>
</div>
<script>

const API = ‘https://script.google.com/macros/s/AKfycbxfvdCcCCZ2eh8LSMKqlllcCKcn0e6HunPkfc3Ue_IXP6rWdeHxrEaYafN60-sVVpcT/exec’;
function jsonp(action,params){return new Promise((res,rej)=>{const cb=‘jcb_’+Date.now()+’_’+Math.random().toString(36).slice(2);const url=new URL(API);url.searchParams.set(‘action’,action);if(params)Object.keys(params).forEach(k=>url.searchParams.set(k,String(params[k])));url.searchParams.set(‘prefix’,cb);let done=false;const cleanup=()=>{try{delete window[cb];}catch(e){}const s=document.getElementById(cb);if(s)s.remove();};window[cb]=d=>{if(done)return;done=true;cleanup();d&&d.error?rej(new Error(d.error)):res(d);};const s=document.createElement(‘script’);s.id=cb;s.onerror=()=>{if(done)return;done=true;cleanup();rej(new Error(‘فشل الاتصال’));};s.src=url.toString();document.body.appendChild(s);});}
const fN=v=>Number(v||0).toLocaleString(‘en-US’);
const fP=v=>Number(v||0).toLocaleString(‘en-US’,{maximumFractionDigits:1});
const escH=s=>String(s??’’).replace(/[&<>”’]/g,c=>({’&’:’&’,’<’:’<’,’>’:’>’,’”’:’"’,”’”:’'’}[c]));
const rankCls=r=>r===1?‘rank-1’:r===2?‘rank-2’:r===3?‘rank-3’:‘rank-n’;
const progCls=p=>p>=80?‘prog-green’:p>=60?‘prog-blue’:p>=40?‘prog-amber’:‘prog-red’;
function kpiCard(label,value,icon,colorCls=’’,sub=’’){return`<div class="kpi-card animate-in"><div class="kpi-label">${escH(label)}</div><div class="kpi-value ${colorCls}">${escH(String(value))}</div>${sub?`<div class="text-muted" style="margin-top:4px;font-size:.75rem;">${sub}</div>`:''}<i class="fas ${escH(icon)} bg-icon"></i></div>`;}
function kpiCardBar(label,value,icon){const pct=Math.min(Number(value)||0,100);return`<div class="kpi-card animate-in"><div class="kpi-label">${escH(label)}</div><div class="kpi-value">${escH(fP(value))}%</div><div class="prog-bar"><div class="prog-fill ${progCls(pct)}" style="width:${pct}%"></div></div><i class="fas ${escH(icon)} bg-icon"></i></div>`;}
function setSpinner(id){document.getElementById(id).innerHTML=’<div class="spinner-wrap animate-in"><div class="spinner"></div><span class="text-muted">جاري التحميل…</span></div>’;}

let _data=null,_sel=’’;
function loadData(){
setSpinner(‘app’);
jsonp(‘getDailySummary’).then(d=>{_data=d;render();}).catch(e=>{
document.getElementById(‘app’).innerHTML=`<div class="spinner-wrap"><span style="color:var(--danger)">خطأ: ${escH(e.message||String(e))}</span></div>`;
});
}
function render(){
if(!_data)return;
const{center,halaqas}=_data;
if(!_sel&&halaqas?.length)_sel=halaqas[0].name;
const students=(_data.studentsByHalaqa&&_sel)?(_data.studentsByHalaqa[_sel]||[]):[];
const app=document.getElementById(‘app’);
app.innerHTML=` <div class="card-sard animate-in"> <div class="card-title"><i class="fas fa-building-columns" style="color:var(--gold);"></i> تقرير المجمع العام</div> <div class="grid-5" style="margin-bottom:12px;"> ${kpiCard('عدد الحلقات',fN(center.halaqaCount),'fa-layer-group')} ${kpiCard('حاضر / متأخر',fN(center.present)+' / '+fN(center.late),'fa-users')} ${kpiCard('الأجزاء المفترضة',fN(center.expectedParts),'fa-list-ol')} ${kpiCard('الأجزاء المعروضة',fN(center.displayedParts),'fa-book-open')} ${kpiCard('الأجزاء المجتازة',fN(center.passedParts),'fa-check-circle','green')} </div> <div class="grid-4"> ${kpiCard('أجزاء الرسوب',fN(center.failedParts),'fa-times-circle','red')} ${kpiCard('الأجزاء المتبقية',fN(center.remainingParts),'fa-hourglass-half','gold')} ${kpiCardBar('نسبة العرض',center.coveragePercent,'fa-chart-line')} ${kpiCardBar('نسبة الاجتياز',center.globalPercent,'fa-trophy')} </div> </div> <div class="card-sard animate-in"> <div class="card-title"><i class="fas fa-table-list" style="color:var(--gold);"></i> تقرير الحلقات</div> <div class="tbl-wrap"> <table class="sard-table"> <thead><tr><th>#</th><th>اسم الحلقة</th><th>حاضر</th><th>متأخر</th><th>معتذر</th><th>غائب</th> <th>المفترض</th><th>المعروضة</th><th>المجتازة</th><th>نسبة العرض</th> <th>المتبقية</th><th>الرسوب</th><th>نسبة الرسوب</th><th>النسبة العامة</th><th>الترتيب</th></tr></thead> <tbody> ${(halaqas||[]).map((h,i)=>`
<tr onclick="selHalaqa('${escH(h.name)}')" style="cursor:pointer;" class="${_sel===h.name?'row-sel':''}">
<td class="text-muted">${i+1}</td>
<td><b>${escH(h.name)}</b>${_sel===h.name?’<span class="badge-sard badge-prim" style="margin-right:6px;font-size:.7rem;">مُختارة</span>’:’’}</td>
<td><span class="badge-sard badge-pass">${fN(h.present)}</span></td>
<td><span class="badge-sard badge-warn">${fN(h.late)}</span></td>
<td><span class="badge-sard badge-info">${fN(h.excused)}</span></td>
<td><span class="badge-sard badge-fail">${fN(h.absent)}</span></td>
<td>${fN(h.expectedParts)}</td><td>${fN(h.displayedParts)}</td>
<td style="color:var(--success);font-weight:700;">${fN(h.passedParts)}</td>
<td>${fP(h.coveragePercent)}%</td>
<td style="color:var(--warning);">${fN(h.remainingParts)}</td>
<td style="color:var(--danger);">${fN(h.failedParts)}</td>
<td style="color:var(--danger);">${fP(h.failPercent)}%</td>
<td style="color:var(--primary);font-weight:800;">${fP(h.globalPercent)}%</td>
<td><span class="rank-badge ${rankCls(h.rank)}">${h.rank}</span></td>
</tr>`).join('')} </tbody> </table> </div> </div> <div class="card-sard animate-in"> <div class="d-flex justify-between align-center flex-wrap gap-2" style="margin-bottom:16px;"> <div class="card-title" style="margin-bottom:0;"><i class="fas fa-user-graduate" style="color:var(--gold);"></i> تقرير الحلقة التفصيلي</div> <div class="d-flex align-center gap-2"> <span class="text-muted fw-bold" style="font-size:.85rem;">اختر الحلقة:</span> <select class="sard-select" id="hSel" onchange="selHalaqa(this.value)"> ${(halaqas||[]).map(h=>`<option value=”${escH(h.name)}” ${_sel===h.name?‘selected’:’’}>${escH(h.name)}</option>`).join('')} </select> </div> </div> <div class="tbl-wrap"> <table class="sard-table"> <thead><tr><th>#</th><th>اسم الطالب</th><th>الحضور</th><th>المفترض</th><th>المعروضة</th> <th>المجتازة</th><th>نسبة العرض</th><th>نسبة الاجتياز</th><th>الرسوب</th><th>نسبة الرسوب</th><th>نسبة الطالب</th><th>الترتيب</th></tr></thead> <tbody> ${students.length===0?`<tr><td colspan="12" style="text-align:center;padding:24px;color:var(--text-muted);">لا توجد بيانات لهذه الحلقة</td></tr>`:''} ${students.map((st,i)=>{ const sL=st.status==='present'?'حاضر':st.status==='late'?'متأخر':st.status==='excused'?'معتذر':st.status==='absent'?'غائب':'—'; const sC=st.status==='present'?'badge-pass':st.status==='late'?'badge-warn':st.status==='excused'?'badge-info':st.status==='absent'?'badge-fail':'badge-prim'; return`<tr>
<td class="text-muted">${i+1}</td><td><b>${escH(st.name)}</b></td>
<td><span class="badge-sard ${sC}">${sL}</span></td>
<td>${fN(st.expectedParts||0)}</td><td>${fN(st.displayedParts||0)}</td>
<td style="color:var(--success);font-weight:700;">${fN(st.passedParts||0)}</td>
<td>${fP(st.coveragePercent||0)}%</td>
<td style="color:#1d4ed8;">${fP(st.passFromExpectedPercent||0)}%</td>
<td style="color:var(--danger);">${fN(st.failedParts||0)}</td>
<td style="color:var(--danger);">${fP(st.failPercent||0)}%</td>
<td style="color:var(--success);font-weight:800;">${fP(st.studentPercent||0)}%</td>
<td><span class="rank-badge ${rankCls(st.rank)}">${st.rank}</span></td>
</tr>`; }).join('')} </tbody> </table> </div> </div>`;
}
function selHalaqa(n){_sel=n;render();setTimeout(()=>document.getElementById(‘hSel’)?.scrollIntoView({behavior:‘smooth’,block:‘center’}),80);}
loadData();
</script>

</body></html>
