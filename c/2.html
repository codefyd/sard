<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تقرير الحلق التفصيلي</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Tajawal',sans-serif;background:#f9f4ee;min-height:100vh;}
    .gradient-header{background:linear-gradient(135deg,#014979 0%,#02385c 60%,#014979 100%);box-shadow:0 4px 20px rgba(1,73,121,.35);}
    .card-modern{background:linear-gradient(145deg,#fff 0%,#fdf9f3 100%);border-radius:1.25rem;box-shadow:0 4px 6px -1px rgba(0,0,0,.04),0 10px 25px -5px rgba(0,0,0,.06);border:1px solid rgba(1,73,121,.08);transition:all .3s;position:relative;overflow:hidden;}
    .card-modern::before{content:'';position:absolute;top:0;right:0;width:100%;height:4px;background:linear-gradient(90deg,#b19738,#e3c777,#b19738);opacity:0;transition:opacity .3s;}
    .card-modern:hover::before{opacity:1;}
    .stat-card{background:#fff;border-radius:1.25rem;padding:1.5rem;position:relative;overflow:hidden;transition:all .3s;border:1px solid rgba(1,73,121,.08);box-shadow:0 8px 20px rgba(0,0,0,.04);}
    .stat-card.gold-accent{border-top:3px solid #b19738;}
    .stat-card.blue-accent{border-top:3px solid #014979;}
    .stat-card.green-accent{border-top:3px solid #059669;}
    .stat-card.purple-accent{border-top:3px solid #7c3aed;}
    .icon-circle{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.25rem;}
    .icon-circle.gold{background:linear-gradient(135deg,#f8ecd1,#f1d7a2);color:#8a6b20;}
    .icon-circle.blue{background:linear-gradient(135deg,#d4e6f1,#b4d3e7);color:#014979;}
    .icon-circle.green{background:linear-gradient(135deg,#d1fae5,#a7f3d0);color:#047857;}
    .icon-circle.purple{background:linear-gradient(135deg,#ede9fe,#ddd6fe);color:#6d28d9;}
    .btn-primary{background:linear-gradient(135deg,#014979,#02385c);color:#fff;border:none;padding:.625rem 1.25rem;border-radius:.75rem;font-weight:600;cursor:pointer;transition:all .3s;box-shadow:0 4px 12px rgba(1,73,121,.35);display:inline-flex;align-items:center;gap:.5rem;font-size:.85rem;}
    .btn-primary:hover{transform:translateY(-2px);}
    .table-modern{width:100%;border-collapse:separate;border-spacing:0;}
    .table-modern thead{background:#f3f4f6;}
    .table-modern thead th{color:#014979;font-weight:600;padding:.75rem;text-align:right;font-size:.8rem;white-space:nowrap;}
    .table-modern tbody tr{background:#fff;transition:all .2s;}
    .table-modern tbody tr:nth-child(even){background:#fbf7f1;}
    .table-modern tbody tr:hover{background:#f5efe5;}
    .table-modern tbody td{padding:.7rem .75rem;border-bottom:1px solid #e2e8f0;font-size:.8rem;vertical-align:middle;}
    .badge-modern{display:inline-flex;align-items:center;gap:.25rem;padding:.35rem .75rem;border-radius:9999px;font-size:.7rem;font-weight:600;}
    .badge-modern.primary{background:linear-gradient(135deg,#014979,#02385c);color:#fff;}
    .badge-modern.success{background:linear-gradient(135deg,#d1fae5,#a7f3d0);color:#047857;}
    .badge-modern.warning{background:linear-gradient(135deg,#fef3c7,#fde68a);color:#b45309;}
    .badge-modern.info{background:linear-gradient(135deg,#e0f2fe,#bfdbfe);color:#0369a1;}
    .badge-modern.danger{background:linear-gradient(135deg,#fee2e2,#fecaca);color:#b91c1c;}
    .section-title{display:flex;align-items:center;gap:.75rem;font-size:1.1rem;font-weight:700;color:#014979;margin-bottom:.75rem;}
    .section-title .icon-wrapper{width:36px;height:36px;border-radius:.75rem;display:flex;align-items:center;justify-content:center;font-size:.9rem;}
    .icon-wrapper.gold-bg{background:linear-gradient(135deg,#f8ecd1,#f1d7a2);color:#8a6b20;}
    .icon-wrapper.blue-bg{background:linear-gradient(135deg,#d4e6f1,#b4d3e7);color:#014979;}
    .icon-wrapper.green-bg{background:linear-gradient(135deg,#d1fae5,#a7f3d0);color:#047857;}
    .loading-spinner{display:inline-block;width:40px;height:40px;border:4px solid rgba(1,73,121,.12);border-radius:50%;border-top-color:#014979;animation:spin 1s ease-in-out infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .fade-in{animation:fadeIn .4s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
    .glow-text{text-shadow:0 0 20px rgba(177,151,56,.4);}
    .halaqa-card{cursor:pointer;border-radius:1rem;padding:1rem 1.1rem;border:1px solid rgba(1,73,121,.1);background:#fff;transition:all .2s;display:flex;flex-direction:column;gap:.3rem;}
    .halaqa-card:hover{box-shadow:0 6px 18px rgba(1,73,121,.18);transform:translateY(-2px);}
    .halaqa-card.active{border-color:#014979;background:linear-gradient(145deg,#fff,#f4f0e6);}
    .student-chip{border-radius:9999px;padding:.35rem .8rem;font-size:.8rem;cursor:pointer;border:1px solid rgba(1,73,121,.16);background:#fff;color:#014979;display:inline-flex;align-items:center;gap:.35rem;transition:all .2s;}
    .student-chip:hover{background:#f3f7fb;}
    .student-chip.active{background:#014979;color:#fff;border-color:#014979;}
    .sard-mini-table{width:100%;border-collapse:collapse;table-layout:fixed;}
    .sard-mini-table th,.sard-mini-table td{border:1px solid #cbd5e1;padding:.3rem .2rem;font-size:.7rem;text-align:center;vertical-align:middle;white-space:nowrap;}
    .sard-mini-table th.teacher-name-header{white-space:normal;line-height:1.1;}
    .sard-mini-table td.fail-face-cell{font-size:.55rem;line-height:1.1;}
    .sard-mini-table thead th{background:#e5edf6;color:#014979;font-weight:700;}
    .sard-mini-table tbody tr:nth-child(even){background:#f9fafb;}
    .sard-mini-table tbody tr:nth-child(odd){background:#fff;}
    @media(max-width:768px){.stat-card{padding:1rem;}.sard-mini-table th,.sard-mini-table td{padding:.2rem .15rem;font-size:.6rem;}.sard-mini-table td.fail-face-cell{font-size:.5rem;}}
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    const API = "https://script.google.com/macros/s/AKfycbxfvdCcCCZ2eh8LSMKqlllcCKcn0e6HunPkfc3Ue_IXP6rWdeHxrEaYafN60-sVVpcT/exec";

    function jsonp(action, params = {}) {
      return new Promise((resolve, reject) => {
        const cb = 'jcb_' + Date.now() + '_' + Math.floor(Math.random() * 1e5);
        const url = new URL(API);
        url.searchParams.set('action', action);
        Object.keys(params).forEach(k => url.searchParams.set(k, String(params[k])));
        url.searchParams.set('prefix', cb);
        let done = false;
        const cleanup = () => { try{delete window[cb];}catch(e){} const s=document.getElementById(cb); if(s)s.remove(); };
        window[cb] = d => { if(done)return; done=true; cleanup(); d&&d.error?reject(new Error(d.error)):resolve(d); };
        const s = document.createElement('script');
        s.id = cb;
        s.onerror = () => { if(done)return; done=true; cleanup(); reject(new Error('فشل الاتصال')); };
        s.src = url.toString();
        document.body.appendChild(s);
      });
    }

    const fmt = v => Number(v||0).toLocaleString('en-US',{maximumFractionDigits:1});
    const fmtN = v => Number(v||0).toLocaleString('en-US');
    const fmtScore = v => { const n=Number(v); if(!isFinite(n))return ''; return Math.abs(n-Math.round(n))<1e-9?String(Math.round(n)):String(Math.round(n*10)/10); };

    const normalizePhone = p => {
      if(!p)return '';
      let d=String(p).replace(/\D/g,'');
      if(d.startsWith('00'))d=d.slice(2);
      if(d.startsWith('966'))return d;
      if(d.startsWith('0'))return '966'+d.slice(1);
      return d;
    };

    function buildStats(student, record) {
      const exp = Number(student.partsCount||0);
      if(!record||!Array.isArray(record.sections)||!record.sections.length)
        return {expectedParts:exp,displayedParts:0,passedParts:0,failedParts:0,remainingParts:exp,coveragePercent:0,passFromDisplayedPercent:0,failPercent:0,passFromExpectedPercent:0,studentPercent:0};

      const hizbMap={};
      record.sections.forEach(s=>{
        if(!s||!s.partNumber)return;
        const pn=Number(s.partNumber); if(!pn||pn<1||pn>30)return;
        const hz=s.hizb!=null?Number(s.hizb):null; if(hz!==1&&hz!==2)return;
        const k=pn+'-'+hz;
        if(!hizbMap[k])hizbMap[k]={hasPass:false,hasFail:false};
        if(s.isPassed)hizbMap[k].hasPass=true; else hizbMap[k].hasFail=true;
      });
      const arr=Object.values(hizbMap),unit=0.5;
      let passed=0,failed=0;
      arr.forEach(h=>{ if(h.hasFail)failed+=unit; else if(h.hasPass)passed+=unit; });
      const disp=arr.length*unit,rem=Math.max(0,exp-disp);
      const div=Number(student.partsDivisions||2)||2,maxSPS=20/div;
      let ws=0;
      record.sections.forEach(s=>{
        if(!s||!s.partNumber)return;
        const pn=Number(s.partNumber); if(!pn||pn<1||pn>30)return;
        const hz=s.hizb!=null?Number(s.hizb):null; if(hz!==1&&hz!==2)return;
        if(!s.isPassed)return;
        const sc=Number(s.score); ws+=isFinite(sc)?(sc/maxSPS):1;
      });
      const denom=exp*div;
      return {
        expectedParts:exp,displayedParts:disp,passedParts:passed,failedParts:failed,remainingParts:rem,
        coveragePercent:exp>0?(disp/exp)*100:0,passFromDisplayedPercent:disp>0?(passed/disp)*100:0,
        failPercent:disp>0?(failed/disp)*100:0,passFromExpectedPercent:exp>0?(passed/exp)*100:0,
        studentPercent:denom>0?(ws/denom)*100:0
      };
    }

    function App() {
      const [loading,setLoading]=useState(true);
      const [refreshing,setRefreshing]=useState(false);
      const [data,setData]=useState(null);
      const [selHalaqa,setSelHalaqa]=useState('');
      const [selStudentId,setSelStudentId]=useState('');

      const load = (bg=false) => {
        bg?setRefreshing(true):setLoading(true);
        jsonp('getData').then(res=>{
          setData(res||null);
          if(res?.halaqas?.length>0){
            setSelHalaqa(p=>p&&res.halaqas.some(h=>h.name===p)?p:res.halaqas[0].name);
          }
          setSelStudentId(prev=>{
            if(!res?.students)return '';
            if(prev&&res.students.some(s=>s.id===prev))return prev;
            const cur=selHalaqa||res.halaqas?.[0]?.name||'';
            const inH=res.students.filter(s=>s.halaqa===cur);
            return inH[0]?.id||'';
          });
          bg?setRefreshing(false):setLoading(false);
        }).catch(()=>{ bg?setRefreshing(false):setLoading(false); });
      };

      useEffect(()=>load(),[]);
      useEffect(()=>{ const id=setInterval(()=>load(true),30000); return()=>clearInterval(id); },[]);

      const halaqas=data?.halaqas||[];
      const students=data?.students||[];
      const records=data?.records||[];
      const studentsInHalaqa=selHalaqa?students.filter(s=>s.halaqa===selHalaqa):[];
      const selStudent=studentsInHalaqa.find(s=>s.id===selStudentId)||null;
      const record=selStudent?records.find(r=>r.studentId===selStudent.id):null;
      const stats=selStudent?buildStats(selStudent,record):{expectedParts:0,displayedParts:0,passedParts:0,failedParts:0,remainingParts:0,coveragePercent:0,passFromDisplayedPercent:0,failPercent:0,passFromExpectedPercent:0,studentPercent:0};

      const grouped=useMemo(()=>{
        if(!record||!Array.isArray(record.sections))return[];
        const m={};
        record.sections.forEach(s=>{
          if(!s||!s.partNumber)return;
          const pn=Number(s.partNumber); if(!pn||pn<1||pn>30)return;
          if(!m[pn])m[pn]={partNumber:pn,hizb1:null,hizb2:null};
          const hz=Number(s.hizb); if(hz===1)m[pn].hizb1=s; else if(hz===2)m[pn].hizb2=s;
        });
        return Object.values(m).sort((a,b)=>a.partNumber-b.partNumber);
      },[record]);

      const sendWA=()=>{
        if(!selStudent)return;
        const phone=normalizePhone(selStudent.guardianPhone);
        if(!phone){alert('لا يوجد رقم ولي أمر مسجّل');return;}
        const msg=`السلام عليكم ورحمة الله وبركاته\n\nولي أمر الطالب : ${selStudent.name}\n\nنضع بين يديك عرض ابنكم:\n\nعدد الأجزاء المفترض عرضها: ${fmtN(stats.expectedParts)}\nعدد الأجزاء المعروضة: ${fmtN(stats.displayedParts)}\nعدد الأجزاء المجتازة: ${fmtN(stats.passedParts)}\nعدد أجزاء الرسوب: ${fmtN(stats.failedParts)}\nنسبة الطالب: ${fmt(stats.studentPercent)}%\n\nبارك الله في الجهود وأجزل لنا ولكم الأجر والمثوبة.`;
        window.open('https://wa.me/'+phone+'?text='+encodeURIComponent(msg),'_blank');
      };

      const statCards=[
        {l:'الأجزاء المفترضة',v:stats.expectedParts,cls:'gold-accent',ic:'gold',i:'fas fa-list-ol'},
        {l:'الأجزاء المعروضة',v:stats.displayedParts,cls:'blue-accent',ic:'blue',i:'fas fa-book-open'},
        {l:'الأجزاء المجتازة',v:stats.passedParts,cls:'green-accent',ic:'green',i:'fas fa-check-circle',sub:`نسبة من المفترض: ${fmt(stats.passFromExpectedPercent)}%`,green:true},
        {l:'رسوب / متبقية',v:null,cls:'purple-accent',ic:'purple',i:'fas fa-times-circle',multi:true},
      ];

      return (
        <div className="min-h-screen flex flex-col">
          <nav className="gradient-header sticky top-0 z-50 h-20 flex items-center px-6">
            <div className="container mx-auto max-w-7xl flex items-center justify-between">
              <div className="flex items-center gap-4">
                <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-[#b19738] to-[#d1b860] flex items-center justify-center shadow-lg">
                  <i className="fas fa-quran text-white text-xl"></i>
                </div>
                <div>
                  <h1 className="font-bold text-xl text-white glow-text">تقرير الحلق التفصيلي</h1>
                  <p className="text-xs text-blue-100 opacity-90">استعراض تفاصيل مقاطع الطالب</p>
                </div>
                <a href="../برنامج_السرد.html" className="hidden md:inline-flex items-center gap-2 text-xs text-blue-100 hover:text-white bg-white/10 px-3 py-2 rounded-lg hover:bg-white/20">
                  <i className="fas fa-arrow-right"></i> العودة للبرنامج
                </a>
              </div>
              <div className="flex items-center gap-3 text-xs text-blue-100">
                {refreshing && <span className="hidden sm:flex items-center gap-1 text-[11px] bg-white/10 px-2 py-1 rounded-full"><span className="w-2 h-2 rounded-full bg-emerald-300 animate-pulse"></span>تحديث...</span>}
                <button onClick={()=>load(false)} className="btn-primary"><i className="fas fa-rotate"></i><span className="hidden sm:inline">تحديث</span></button>
              </div>
            </div>
          </nav>

          <div className="container mx-auto px-4 py-6 space-y-6 max-w-7xl flex-1">
            {loading && <div className="flex flex-col items-center justify-center py-16 gap-4"><div className="loading-spinner"></div><p className="text-sm text-gray-500">جاري تحميل البيانات...</p></div>}

            {!loading && !data && <div className="flex flex-col items-center justify-center py-16 gap-3 text-gray-500 fade-in"><i className="fas fa-database text-3xl text-gray-300"></i><p className="text-sm font-medium">لا توجد بيانات</p></div>}

            {!loading && data && (
              <>
                {/* اختيار الحلقة */}
                <section className="space-y-4 fade-in">
                  <div className="section-title"><span className="icon-wrapper blue-bg"><i className="fas fa-layer-group"></i></span>اختر الحلقة</div>
                  <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
                    {halaqas.map(h=>{
                      const cnt=students.filter(s=>s.halaqa===h.name).length;
                      return (
                        <div key={h.name} className={`halaqa-card ${selHalaqa===h.name?'active':''}`}
                          onClick={()=>{ setSelHalaqa(h.name); const inH=students.filter(s=>s.halaqa===h.name); setSelStudentId(inH[0]?.id||''); }}>
                          <div className="flex items-center justify-between">
                            <div className="flex items-center gap-2">
                              <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-[#b19738] to-[#d1b860] flex items-center justify-center text-white"><i className="fas fa-mosque text-sm"></i></div>
                              <div><span className="font-bold text-[#014979] text-sm">{h.name}</span><br/><span className="text-[11px] text-gray-500">{fmtN(cnt)} طالباً</span></div>
                            </div>
                            {selHalaqa===h.name && <span className="badge-modern primary text-[10px]"><i className="fas fa-check-circle text-[10px]"></i>مختارة</span>}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </section>

                {/* اختيار الطالب */}
                <section className="space-y-3 fade-in">
                  <div className="section-title"><span className="icon-wrapper gold-bg"><i className="fas fa-user-graduate"></i></span>اختر الطالب</div>
                  <div className="flex flex-wrap gap-2">
                    {studentsInHalaqa.map(st=>(
                      <button key={st.id} type="button" className={`student-chip ${selStudentId===st.id?'active':''}`} onClick={()=>setSelStudentId(st.id)}>
                        <i className="fas fa-user text-[11px]"></i>{st.name}
                      </button>
                    ))}
                    {studentsInHalaqa.length===0 && <p className="text-sm text-gray-500">لا يوجد طلاب في هذه الحلقة</p>}
                  </div>
                </section>

                {selStudent && (
                  <>
                    {/* بطاقة الطالب + الإحصائيات */}
                    <section className="space-y-4 fade-in">
                      <div className="section-title"><span className="icon-wrapper green-bg"><i className="fas fa-id-card"></i></span>ملف الطالب</div>
                      <div className="grid md:grid-cols-3 gap-4">
                        <div className="card-modern p-4 md:col-span-1">
                          <div className="flex items-center gap-3 mb-3">
                            <div className="w-10 h-10 rounded-full bg-[#014979] text-white flex items-center justify-center"><i className="fas fa-user"></i></div>
                            <div><p className="text-sm text-gray-500">اسم الطالب</p><p className="font-bold text-[#014979]">{selStudent.name}</p></div>
                          </div>
                          <div className="space-y-2 text-sm text-gray-600">
                            {[['fas fa-mosque','الحلقة',selStudent.halaqa||'—'],['fas fa-route','المسار',selStudent.track||'—'],['fas fa-phone','جوال ولي الأمر',selStudent.guardianPhone||'—'],['fas fa-book-quran','الأجزاء المحفوظة',fmtN(selStudent.partsCount||0)]].map(([ic,l,v],i)=>(
                              <div key={i} className="flex items-center gap-2">
                                <i className={`${ic} text-[#b19738] w-4`}></i>
                                <span className="font-medium">{l}:</span><span>{v}</span>
                              </div>
                            ))}
                          </div>
                        </div>
                        <div className="md:col-span-2 grid sm:grid-cols-2 gap-4">
                          <div className="stat-card gold-accent"><div className="flex items-start justify-between"><div><p className="text-xs text-gray-500 mb-1">الأجزاء المفترضة</p><p className="text-2xl font-bold text-[#014979]">{fmtN(stats.expectedParts)}</p></div><div className="icon-circle gold"><i className="fas fa-list-ol"></i></div></div></div>
                          <div className="stat-card blue-accent"><div className="flex items-start justify-between"><div><p className="text-xs text-gray-500 mb-1">الأجزاء المعروضة</p><p className="text-2xl font-bold text-[#014979]">{fmtN(stats.displayedParts)}</p></div><div className="icon-circle blue"><i className="fas fa-book-open"></i></div></div></div>
                          <div className="stat-card green-accent"><div className="flex items-start justify-between"><div><p className="text-xs text-gray-500 mb-1">الأجزاء المجتازة</p><p className="text-2xl font-bold text-emerald-700">{fmtN(stats.passedParts)}</p><p className="text-[11px] text-gray-500 mt-1">من المفترض: {fmt(stats.passFromExpectedPercent)}%</p></div><div className="icon-circle green"><i className="fas fa-check-circle"></i></div></div></div>
                          <div className="stat-card purple-accent">
                            <div className="flex items-start justify-between">
                              <div><p className="text-xs text-gray-500 mb-1">رسوب / متبقية</p><p className="text-lg font-bold text-red-600">رسوب: {fmtN(stats.failedParts)}</p><p className="text-sm font-bold text-amber-700">متبقية: {fmtN(stats.remainingParts)}</p><div className="mt-2 text-[11px] text-gray-500">نسبة الرسوب من المعروض: <span className="text-red-500 font-semibold">{fmt(stats.failPercent)}%</span></div></div>
                              <div className="icon-circle purple"><i className="fas fa-times-circle"></i></div>
                            </div>
                          </div>
                        </div>
                      </div>

                      {/* نسبة الطالب + واتساب */}
                      <div className="card-modern p-4 flex flex-wrap items-center justify-between gap-3">
                        <div className="flex items-center gap-3">
                          <div className="text-2xl font-black text-[#014979]">{fmt(stats.studentPercent)}%</div>
                          <div className="text-sm text-gray-500">نسبة الطالب الإجمالية</div>
                        </div>
                        {selStudent.guardianPhone
                          ? <button type="button" onClick={sendWA} className="btn-primary"><i className="fab fa-whatsapp"></i>إرسال لولي الأمر</button>
                          : <span className="text-xs text-red-500">رقم ولي الأمر غير مسجَّل</span>}
                      </div>
                    </section>

                    {/* جدول المقاطع */}
                    <section className="space-y-4 fade-in">
                      <div className="section-title"><span className="icon-wrapper blue-bg"><i className="fas fa-list-check"></i></span>تفاصيل المقاطع</div>
                      <div className="card-modern overflow-hidden">
                        <div className="overflow-x-auto">
                          {grouped.length > 0 ? (
                            <table className="sard-mini-table">
                              <thead>
                                <tr>
                                  <th rowSpan="2" className="teacher-name-header"><span>اسم<br/>المسمّع</span></th>
                                  <th rowSpan="2">الجزء</th>
                                  <th colSpan="4">الحزب الأول</th>
                                  <th colSpan="4">الحزب الثاني</th>
                                </tr>
                                <tr>
                                  {['خطأ','تنبيه','الدرجة','وجه الرسوب','خطأ','تنبيه','الدرجة','وجه الرسوب'].map((h,i)=><th key={i}>{h}</th>)}
                                </tr>
                              </thead>
                              <tbody>
                                {grouped.map(row=>{
                                  const h1=row.hizb1, h2=row.hizb2;
                                  const t1=h1?.teacherName?.trim()||'', t2=h2?.teacherName?.trim()||'';
                                  const tD=t1&&t2?(t1===t2?t1:t1+' / '+t2):t1||t2||'غير محدد';
                                  return (
                                    <tr key={row.partNumber}>
                                      <td>{tD}</td>
                                      <td>{row.partNumber}</td>
                                      <td>{h1?h1.mistakes||0:''}</td>
                                      <td>{h1?h1.warnings||0:''}</td>
                                      <td className={h1?(h1.isPassed?'text-emerald-700 font-bold':'text-red-700 font-bold'):''}>{h1?fmtScore(h1.score):''}</td>
                                      <td className="fail-face-cell">{h1&&!h1.isPassed?h1.failFace||'':''}</td>
                                      <td>{h2?h2.mistakes||0:''}</td>
                                      <td>{h2?h2.warnings||0:''}</td>
                                      <td className={h2?(h2.isPassed?'text-emerald-700 font-bold':'text-red-700 font-bold'):''}>{h2?fmtScore(h2.score):''}</td>
                                      <td className="fail-face-cell">{h2&&!h2.isPassed?h2.failFace||'':''}</td>
                                    </tr>
                                  );
                                })}
                              </tbody>
                            </table>
                          ) : (
                            <div className="p-6 text-center text-sm text-gray-500">لا توجد مقاطع مسجَّلة لهذا الطالب حتى الآن.</div>
                          )}
                        </div>
                      </div>
                    </section>
                  </>
                )}
              </>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
